spring:
  profiles:
    active: test

# Disable security for tests
security:
  enabled: false

# Test database configuration
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

# MyBatis test configuration
mybatis:
  configuration:
    map-underscore-to-camel-case: true