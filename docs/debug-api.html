<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API 调试</title>
</head>
<body>
    <h1>管理员权限调试</h1>

    <div>
        <h2>步骤 1: 登录</h2>
        <input type="text" id="username" value="admin" placeholder="用户名">
        <input type="password" id="password" value="admin123" placeholder="密码">
        <button onclick="login()">登录</button>
        <pre id="loginResult"></pre>
    </div>

    <div>
        <h2>步骤 2: 获取项目列表</h2>
        <button onclick="getProjects()">获取项目列表</button>
        <pre id="projectsResult"></pre>
    </div>

    <script>
        let token = '';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                document.getElementById('loginResult').textContent = JSON.stringify(data, null, 2);

                if (data.access_token) {
                    token = data.access_token;

                    // 解码 JWT
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    console.log('JWT Payload:', payload);
                    document.getElementById('loginResult').textContent += '\n\nJWT Payload:\n' + JSON.stringify(payload, null, 2);
                }
            } catch (error) {
                document.getElementById('loginResult').textContent = 'Error: ' + error.message;
            }
        }

        async function getProjects() {
            if (!token) {
                alert('请先登录');
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/projects/list', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                document.getElementById('projectsResult').textContent = JSON.stringify(data, null, 2);

                if (data.code === 200 && data.data) {
                    console.log('项目数量:', data.data.total);
                    console.log('项目列表:', data.data.projects);
                }
            } catch (error) {
                document.getElementById('projectsResult').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
